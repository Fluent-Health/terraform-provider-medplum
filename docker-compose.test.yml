services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: medplum
      POSTGRES_DB: medplum
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "medplum"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "medplum", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  medplum:
    image: medplum/medplum-server:5.0.10
    # The server ENTRYPOINT is `node ... index.js`; the config source must be passed
    # as an argument. "env" tells Medplum to read config from MEDPLUM_* env vars
    # (server src/config/loader.ts). Without it the server defaults to
    # file:medplum.config.json and fails to boot.
    command: ["env"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8103:8103"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8103/healthcheck',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    environment:
      MEDPLUM_DATABASE_HOST: postgres
      MEDPLUM_DATABASE_PORT: "5432"
      MEDPLUM_DATABASE_DBNAME: medplum
      MEDPLUM_DATABASE_USERNAME: medplum
      MEDPLUM_DATABASE_PASSWORD: medplum
      MEDPLUM_REDIS_HOST: redis
      MEDPLUM_REDIS_PORT: "6379"
      MEDPLUM_REDIS_PASSWORD: medplum
      MEDPLUM_BASE_URL: "http://localhost:8103/"
      MEDPLUM_PORT: "8103"
      # Disable rate limiting for tests. Medplum throttles /auth/login to 5/min
      # (defaultLoginRateLimit); the acceptance suite runs many terraform
      # subprocesses that each re-login, tripping a 429. Setting defaultRateLimit
      # to -1 disables the limiter entirely (the same approach Medplum uses in its
      # own test config).
      MEDPLUM_DEFAULT_RATE_LIMIT: "-1"
      # Bots: vmcontext execution is disabled by default server-side
      # (config vmContextBotsEnabled); the medplum_bot acceptance test
      # deploys and $execute's a vmcontext bot.
      MEDPLUM_VM_CONTEXT_BOTS_ENABLED: "true"
      # Binary storage: unset in the "env" config source (server config/loader.ts
      # only defaults it under loadTestConfig, which this stack does not use).
      # Bot creation writes the deployed code as a Binary (fhir/operations/deploy.ts),
      # so without this, Bot creation fails with "Binary storage not initialized".
      # Container-local path is fine — this stack is ephemeral per test run.
      MEDPLUM_BINARY_STORAGE: "file:/tmp/medplum-storage"
