name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin the linter so a floating "latest" can't surface new rules and
          # fail CI on unchanged code out of the blue (as v2.12.2 did).
          version: v2.12.2

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./... -count=1

  # Delegates to the reusable acceptance workflow so the exact same suite gates
  # both PRs/main here and tag releases in release.yml.
  acceptance:
    needs: [lint, unit]
    uses: ./.github/workflows/acceptance.yml

  e2e-profile:
    needs: [unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cache the IG Publisher jar and downloaded FHIR packages.
      # Key includes the pinned publisher version so a version bump busts the cache.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.fhir-ig-publisher
            ~/.fhir
          key: fhir-ig-publisher-v1.8.5-${{ runner.os }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.12.1"
          terraform_wrapper: false

      - name: Start Medplum
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for Medplum
        run: ./scripts/wait-for-medplum.sh

      - name: Build FSH → IG Publisher → snapshot SD
        run: ./scripts/build-fsh.sh

      - name: FSH e2e acceptance test
        env:
          TF_ACC: "1"
          MEDPLUM_BASE_URL: "http://localhost:8103"
          MEDPLUM_EMAIL: "admin@example.com"
          MEDPLUM_PASSWORD: "medplum_admin"
          MEDPLUM_TEST_PROFILE_SD: "${{ github.workspace }}/test/fsh/generated-sd.json"
        run: |
          export TF_ACC_TERRAFORM_PATH="$(which terraform)"
          echo "Using Terraform at: $TF_ACC_TERRAFORM_PATH ($(terraform version | head -1))"
          go test ./internal/provider/... -run TestAccFHIRProfile_fromFSH -v -timeout 30m

      - name: Medplum logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs medplum

      - name: IG Publisher output on failure
        if: failure()
        run: |
          echo "=== IG Publisher stdout (last 100 lines) ==="
          tail -100 /tmp/ig-publisher-output.txt 2>/dev/null || echo "(no publisher output file)"
          echo "=== qa.txt ==="
          cat test/fsh/output/qa.txt 2>/dev/null || echo "(no qa.txt)"
